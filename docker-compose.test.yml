services:
  test_database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padel_test
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padel_test"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend_tests:
    build:
      context: ./backend
    environment:
      APP_ENV: test
      APP_SECRET: test-secret
      DATABASE_URL: postgresql://padel:padel@test_database:5432/padel_test?serverVersion=16&charset=utf8
      FRONTEND_URL: http://localhost:5173
      MAILER_DSN: "null://null"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ""
    depends_on:
      test_database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_test_vendor:/app/vendor
    command: >
      sh -c "composer install --no-interaction --prefer-dist --no-progress --no-scripts
      && php bin/console lexik:jwt:generate-keypair --skip-if-exists --env=test
      && php bin/console doctrine:migrations:migrate --no-interaction --env=test
      && ./vendor/bin/simple-phpunit"

  frontend_tests:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    command: sh -c "npm install && npm run test"

volumes:
  backend_test_vendor:
  frontend_test_node_modules:
