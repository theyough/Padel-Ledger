services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padel"]
      interval: 5s
      timeout: 5s
      retries: 12

  mailer:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      APP_SECRET: change-me-in-prod
      DATABASE_URL: postgresql://padel:padel@database:5432/padel?serverVersion=16&charset=utf8
      FRONTEND_URL: http://localhost:5173
      MAILER_DSN: smtp://mailer:1025
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ""
    depends_on:
      database:
        condition: service_healthy
      mailer:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
